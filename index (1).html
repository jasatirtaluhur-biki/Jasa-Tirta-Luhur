<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4285f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Customer Jasa Tirta Luhur💧</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NOTIFICATION -->
  <div id="notification" class="notification"></div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-container">
    <div class="login-card">
      <h1 class="login-title">🔐 Login</h1>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Masukkan username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Masukkan password">
      </div>
      <button class="btn btn-primary" onclick="login()">Login</button>
      <button id="installBtn" onclick="installPWA()">📱 Install Aplikasi</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden">
    <!-- HEADER -->
    <div class="header">
      <h1>📋 Customer Data</h1>
      <div class="user-info">
        <span id="userDisplay"></span>
        <button onclick="logout()" style="float:right; background:rgba(255,255,255,0.2); border:none; padding:6px 12px; border-radius:6px; color:white; cursor:pointer;">Logout</button>
      </div>
    </div>

    <!-- FORM INPUT -->
    <div id="formScreen" class="container">
      <div class="card">
        <h2 style="margin-bottom:20px; color:#333;">➕ Input Data Baru</h2>
        
        <div class="form-group">
          <label>ID Pelanggan *</label>
          <input type="text" id="idPelanggan" placeholder="Contoh: CUST-001" required>
        </div>

        <div class="form-group">
          <label>Tanggal *</label>
          <input type="date" id="tanggal" required>
        </div>

        <div class="form-group">
          <label>Nama *</label>
          <input type="text" id="nama" placeholder="Nama lengkap pelanggan" required>
        </div>

        <div class="form-group">
          <label>Alamat *</label>
          <textarea id="alamat" placeholder="Alamat lengkap" required></textarea>
        </div>

        <!-- ✅ UBAH: Status → Kondisi Water Meter -->
        <div class="form-group">
          <label>Kondisi Water Meter *</label>
          <select id="kondisi" required>
            <option value="">Pilih Kondisi</option>
            <option value="Normal">✅ Normal</option>
            <option value="Error">❌ Error</option>
          </select>
        </div>

        <!-- ✅ BARU: Jenis Pengguna -->
        <div class="form-group">
          <label>Jenis Pengguna *</label>
          <select id="jenisPengguna" required>
            <option value="">Pilih Jenis Pengguna</option>
            <option value="Penduduk">🏠 Penduduk</option>
            <option value="Niaga">🏪 Niaga</option>
            <option value="Industri">🏭 Industri</option>
          </select>
        </div>

        <!-- ✅ UBAH: Foto sekarang WAJIB -->
        <div class="form-group">
          <label>Foto Water Meter * <span id="fotoStatus" class="foto-status foto-belum">Belum diambil</span></label>
          <div class="camera-container" id="cameraContainer">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="cameraPlaceholder" class="camera-placeholder">
              <div>📷</div>
              <div>Tekan "Buka Kamera" untuk mengambil foto</div>
            </div>
          </div>
          <div class="camera-controls">
            <button class="btn btn-primary btn-small" onclick="startCamera()">📷 Buka Kamera</button>
            <button class="btn btn-success btn-small" onclick="capturePhoto()" id="captureBtn" disabled>✓ Ambil Foto</button>
            <button class="btn btn-danger btn-small" onclick="resetCamera()">✕ Reset</button>
          </div>
          <img id="preview" class="preview-img hidden">
        </div>

        <div class="form-group">
          <label>Catatan (Opsional)</label>
          <textarea id="catatan" placeholder="Catatan tambahan..."></textarea>
        </div>

        <button class="btn btn-success" onclick="saveData()" id="saveBtn">
          💾 Simpan Data
        </button>
      </div>
    </div>

    <!-- HISTORY SCREEN -->
    <div id="historyScreen" class="container hidden">
      <div class="card">
        <h2 style="margin-bottom:16px; color:#333;">📜 Riwayat Data</h2>

        <!-- ✅ BARU: Filter kondisi dan jenis pengguna -->
        <div class="filter-row">
          <select id="filterKondisi" onchange="loadHistory()">
            <option value="">Semua Kondisi</option>
            <option value="Normal">✅ Normal</option>
            <option value="Error">❌ Error</option>
          </select>
          <select id="filterJenis" onchange="loadHistory()">
            <option value="">Semua Jenis</option>
            <option value="Penduduk">🏠 Penduduk</option>
            <option value="Niaga">🏪 Niaga</option>
            <option value="Industri">🏭 Industri</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="loadHistory()" style="margin-bottom:16px;">
          🔄 Refresh
        </button>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
      <button class="nav-item active" onclick="switchScreen('form')">
        <div class="nav-icon">➕</div>
        <div class="nav-label">Input</div>
      </button>
      <button class="nav-item" onclick="switchScreen('history')">
        <div class="nav-icon">📜</div>
        <div class="nav-label">Riwayat</div>
      </button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
